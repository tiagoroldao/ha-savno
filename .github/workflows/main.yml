name: Release Build & Publish

on:
  release:
    types:
      - published
  # ADD THIS SECTION:
  workflow_dispatch:

jobs:
  build_and_release:
    name: Build, Zip, and Upload
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 🛍️ Checkout repo
        uses: actions/checkout@v4

      - name: 🤐 Zip Integration
        run: |
          cd custom_components/savno
          zip -r ../../savno.zip .

      # Update this step to handle manual runs (workflow_dispatch)
      - name: ☁️ Upload zip to release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: savno.zip
